<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realm Rush: Duels of Destiny</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- LOGIN SCREEN -->

<div id="login-screen">

    <div class="login-box">

        <h1>Realm Rush</h1>

        <p>Duels of Destiny</p>

        <input
            type="text"
            id="username"
            placeholder="Nombre del jugador"
        >

        <button id="start-game">
            Entrar a la Arena
        </button>

    </div>

</div>
    <!-- MENU -->
    <div class="main-menu">
        <h1>Realm Rush</h1>
        <p>Duels of Destiny</p>

        <div class="menu-buttons">
            <button>Jugar</button>
            <button>Opciones</button>
            <button>Ranking</button>
        </div>
        
    </div>

    <!-- HUD -->
    <div class="hud">

        <div class="timer">
            03:00
        </div>

        <div class="energy-container">
            <div class="energy-bar">
                <div class="energy-fill"></div>
            </div>

            <span class="energy-text">10 / 10</span>
        </div>

    </div>

    <!-- GAME BOARD -->
    <div class="game-board">

        <!-- ENEMY SIDE -->
        <div class="enemy-side">

            <div class="tower enemy king"></div>

            <div class="tower enemy left"></div>
            <div class="tower enemy right"></div>

        </div>

        <!-- CENTER RIVER -->
        <div class="river">
            <div class="bridge"></div>
            <div class="bridge"></div>
        </div>

        <!-- PLAYER SIDE -->
        <div class="player-side">

            <div class="tower player king"></div>

            <div class="tower player left"></div>
            <div class="tower player right"></div>

        </div>

    </div>

    <!-- CARDS -->
    <div class="cards-container">

        <div class="card">
            <span class="cost">3</span>
            <h3>Guerrero</h3>
        </div>

        <div class="card">
            <span class="cost">4</span>
            <h3>Mago</h3>
        </div>

        <div class="card">
            <span class="cost">5</span>
            <h3>Dragón</h3>
        </div>

        <div class="card">
            <span class="cost">2</span>
            <h3>Arquero</h3>
        </div>

    </div>

    <!-- BATTLE LOG -->
    <div class="battle-log">
        <h2>Battle Log</h2>

        <div class="log-messages">
            <p>⚔️ Guerrero desplegado</p>
            <p>🔥 Bola de fuego lanzada</p>
            <p>🐉 Dragón invocado</p>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <button>Reiniciar</button>
        <button>Salir</button>
    </div>
<!-- PLAYER STATS -->

<div class="player-profile">

    <h3 id="player-name">
        Jugador
    </h3>

    <p id="player-level">
        Nivel 1
    </p>

    <p id="player-gold">
        Oro: 100
    </p>

    <p id="player-trophies">
        Copas: 0
    </p>

</div>
    <script src="script.js"></script>

</body>
    
</html>
